name: Build Unsigned iOS .ipa (Flutter)

on:
  push:
    branches: [main]
    paths:
      - "barcode_scanner_flutter/**"
      - ".github/workflows/build-unsigned-ipa-flutter.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    defaults:
      run:
        working-directory: barcode_scanner_flutter

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.5

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Stash custom iOS overrides
        # `flutter create .` will not generate a complete iOS project (no
        # Runner.xcodeproj, no ios/Flutter/*.xcconfig) if the ios/ directory
        # already partially exists. Move our overrides aside, fully scaffold,
        # then restore them on top of the generated project.
        run: |
          mkdir -p ../_overrides
          mv ios ../_overrides/ios
          ls ../_overrides/ios

      - name: Generate full Flutter project (ios platform)
        run: |
          flutter create \
            --org com.bboxfix \
            --project-name barcode_scanner_flutter \
            --platforms=ios \
            .
          echo '--- generated ios/ tree ---'
          find ios -maxdepth 3 -print

      - name: Restore custom iOS overrides on top of scaffolding
        run: |
          # Overlay native iOS customizations from our stash (do NOT touch generated Podfile).
          cp ../_overrides/ios/Runner/AppDelegate.swift ios/Runner/AppDelegate.swift
          if [ -d ../_overrides/ios/CRPTBridge ]; then
            rm -rf ios/CRPTBridge
            cp -R ../_overrides/ios/CRPTBridge ios/CRPTBridge
          fi
          if [ -d ../_overrides/ios/third_party ]; then
            rm -rf ios/third_party
            cp -R ../_overrides/ios/third_party ios/third_party
          fi
          ls ios/Runner

      - name: Patch Info.plist (camera permission + portrait only)
        run: |
          PLIST=ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Camera is required to scan DataMatrix codes.'" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'Camera is required to scan DataMatrix codes.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName 'DMTX Scanner'" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$PLIST"
          echo '--- Info.plist after patch ---'
          /usr/libexec/PlistBuddy -c "Print" "$PLIST"

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate ios/Flutter/Generated.xcconfig
        # `pod install` requires Generated.xcconfig. It is produced by
        # `flutter build ios --config-only`.
        run: |
          flutter build ios --config-only --no-codesign --release
          test -f ios/Flutter/Generated.xcconfig || (echo 'ERROR: Generated.xcconfig missing'; exit 1)

      - name: Install committed Podfile (with TensorFlowLiteSwift)
        # Flutter 3.24.5 does NOT auto-generate ios/Podfile during
        # `flutter create` or `--config-only`. Use our pre-authored Podfile.
        run: |
          cp ci/Podfile.template ios/Podfile
          echo '--- ios/Podfile ---'
          cat ios/Podfile

      - name: Bump Runner deployment target to iOS 13.0
        # Flutter 3.24 scaffolds Runner.xcodeproj with iOS 12.0; TFLiteSwift
        # 2.14 requires iOS 13.0. Patch the project file directly.
        run: |
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = 12.0;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g" ios/Runner.xcodeproj/project.pbxproj
          grep IPHONEOS_DEPLOYMENT_TARGET ios/Runner.xcodeproj/project.pbxproj

      - name: Build epoch8 ZXingCpp.xcframework (CRPT)
        run: |
          set -euo pipefail
          EPOCH8_LOG="$PWD/epoch8_build.log"

          rm -rf ../_epoch8_zxing_cpp
          git clone --depth 1 \
            --branch crpt-prod-fixed-mediapipe-10.30 \
            https://github.com/epoch8/zxing-cpp.git ../_epoch8_zxing_cpp

          rm -rf ../_opencv_ios
          mkdir -p ../_opencv_ios
          curl -L --retry 3 --retry-delay 2 \
            -o ../_opencv_ios/opencv-ios.zip \
            https://github.com/opencv/opencv/releases/download/4.10.0/opencv-4.10.0-ios-framework.zip
          unzip -q ../_opencv_ios/opencv-ios.zip -d ../_opencv_ios

          OPENCV_FRAMEWORK="$(find "$(cd .. && pwd)/_opencv_ios" -type d -name opencv2.framework | head -n 1)"
          test -n "$OPENCV_FRAMEWORK"
          test -d "$OPENCV_FRAMEWORK/Headers"
          # CMake rejects INTERFACE includes under the source tree — vendor OpenCV outside the repo.
          OPENCV_VENDOR="${RUNNER_TEMP:-/tmp}/opencv2-ios-vendor"
          rm -rf "$OPENCV_VENDOR"
          mkdir -p "$OPENCV_VENDOR"
          cp -R "$OPENCV_FRAMEWORK" "$OPENCV_VENDOR/opencv2.framework"
          export OpenCV_INCLUDE_DIRS="$OPENCV_VENDOR/opencv2.framework/Headers"
          export OpenCV_FRAMEWORK_DIR="$OPENCV_VENDOR"
          echo "OpenCV_INCLUDE_DIRS=$OpenCV_INCLUDE_DIRS"
          echo "OpenCV_FRAMEWORK_DIR=$OpenCV_FRAMEWORK_DIR"

          # Patch epoch8 CMake for iOS OpenCV framework linkage.
          # CRPT fork REQUIRES OpenCV (BitMatrix/DMDetector). Do NOT skip OpenCV on iOS.
          python3 - <<'PY'
          from pathlib import Path

          p = Path('../_epoch8_zxing_cpp/core/CMakeLists.txt')
          s = p.read_text(encoding='utf-8')

          ios_block = (
              'if(CMAKE_SYSTEM_NAME STREQUAL "iOS")\n'
              '    get_filename_component(OpenCV_INCLUDE_DIRS_ABS "${OpenCV_INCLUDE_DIRS}" ABSOLUTE)\n'
              '    get_filename_component(OpenCV_FRAMEWORK_DIR_ABS "${OpenCV_FRAMEWORK_DIR}" ABSOLUTE)\n'
              '    add_library(opencv_interface INTERFACE)\n'
              '    target_include_directories(opencv_interface INTERFACE "$<BUILD_INTERFACE:${OpenCV_INCLUDE_DIRS_ABS}>")\n'
              '    target_link_options(opencv_interface INTERFACE "-F${OpenCV_FRAMEWORK_DIR_ABS}")\n'
              '    target_link_libraries(opencv_interface INTERFACE "-framework opencv2")\n'
              '    set(OpenCV_FOUND TRUE)\n'
              '    set(OpenCV_LIBS opencv_interface)\n'
              'elseif(NOT DEFINED BUILD_FOR_AARM OR NOT BUILD_FOR_AARM)\n'
          )

          # epoch8 uses `if` (not elseif) for the Linux pkg-config branch.
          needle = 'if(NOT DEFINED BUILD_FOR_AARM OR NOT BUILD_FOR_AARM)'
          if needle not in s:
              raise RuntimeError('epoch8 CMakeLists layout changed: cannot find Linux/Android OpenCV branch')
          if 'CMAKE_SYSTEM_NAME STREQUAL "iOS"' not in s:
              s = s.replace(needle, ios_block, 1)
              print('Patched: iOS OpenCV + elseif Linux pkg-config branch')
          else:
              print('INFO: iOS OpenCV block already present')

          link_needle = (
              'else()\n'
              '    # Linux build: use opencv_interface from pkg-config\n'
              '    target_link_libraries(ZXing PRIVATE Threads::Threads ${OpenCV_LIBS})'
          )
          link_repl = (
              'else()\n'
              '    # Linux/iOS build: opencv_interface from pkg-config or iOS framework\n'
              '    target_link_libraries(ZXing PRIVATE Threads::Threads ${OpenCV_LIBS})'
          )
          if link_needle in s and 'Linux/iOS build' not in s:
              s = s.replace(link_needle, link_repl, 1)
              print('Patched: OpenCV includes for iOS ZXing target')
          elif 'Linux/iOS build' in s:
              print('INFO: link block already patched')
          else:
              print('WARN: OpenCV link block not found; file layout may have changed')

          s = s.replace('opencv_gapi', '')
          p.write_text(s, encoding='utf-8')
          print('Wrote', p)
          PY

          # Rewrite build-release.sh (avoid fragile line-insert; fix ';' in ARCHS breaking shell).
          python3 - <<'PY'
          from pathlib import Path

          p = Path('../_epoch8_zxing_cpp/wrappers/ios/build-release.sh')
          p.write_text(
              '''#!/usr/bin/env bash
set -euo pipefail

echo "========= Remove previous builds"
rm -rf _builds
rm -rf ZXingCpp.xcframework

echo "========= Create project structure"
cmake -S../../ -B_builds -GXcode \\
    -DCMAKE_SYSTEM_NAME=iOS \\
    -DCMAKE_OSX_ARCHITECTURES=arm64 \\
    -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \\
    -DCMAKE_INSTALL_PREFIX="$(pwd)/_install" \\
    -DCMAKE_XCODE_ATTRIBUTE_ONLY_ACTIVE_ARCH=NO \\
    -DBUILD_UNIT_TESTS=NO \\
    -DBUILD_BLACKBOX_TESTS=NO \\
    -DBUILD_EXAMPLES=NO \\
    -DBUILD_APPLE_FRAMEWORK=YES \\
    -DOpenCV_INCLUDE_DIRS="${OpenCV_INCLUDE_DIRS}" \\
    -DOpenCV_FRAMEWORK_DIR="${OpenCV_FRAMEWORK_DIR}"

if [ -f _builds/ZXing.xcodeproj/project.pbxproj ]; then
  sed -i "" "s/opencv_gapi//g" _builds/ZXing.xcodeproj/project.pbxproj
fi

echo "========= Build the sdk for simulators"
xcodebuild -project _builds/ZXing.xcodeproj build \\
    -target ZXing \\
    -parallelizeTargets \\
    -configuration Release \\
    -hideShellScriptEnvironment \\
    -sdk iphonesimulator \\
    -arch arm64

echo "========= Build the sdk for iOS"
xcodebuild -project _builds/ZXing.xcodeproj build \\
    -target ZXing \\
    -parallelizeTargets \\
    -configuration Release \\
    -hideShellScriptEnvironment \\
    -sdk iphoneos

echo "========= Create the xcframework"
xcodebuild -create-xcframework \\
    -framework ./_builds/core/Release-iphonesimulator/ZXing.framework \\
    -framework ./_builds/core/Release-iphoneos/ZXing.framework \\
    -output ZXingCpp.xcframework
''',
              encoding='utf-8',
          )
          p.chmod(0o755)
          print('Rewrote', p)
          PY

          cd ../_epoch8_zxing_cpp/wrappers/ios
          ./build-release.sh 2>&1 | tee "$EPOCH8_LOG"

          test -d ../_epoch8_zxing_cpp/wrappers/ios/ZXingCpp.xcframework \
            || (echo 'ERROR: ZXingCpp.xcframework missing after build-release.sh'; exit 1)

          cd ../../../barcode_scanner_flutter
          rm -rf ios/third_party/ZXingCpp.xcframework
          cp -R ../_epoch8_zxing_cpp/wrappers/ios/ZXingCpp.xcframework ios/third_party/ZXingCpp.xcframework
          rm -rf ios/third_party/opencv2.framework
          cp -R "$OPENCV_FRAMEWORK" ios/third_party/opencv2.framework
          find ios/third_party -maxdepth 2 -type d -print

      - name: Show epoch8 build log tail on failure
        if: failure()
        run: |
          echo '--- Last 250 lines of _epoch8_build.log ---'
          tail -n 250 epoch8_build.log || true

      - name: Upload epoch8 build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: epoch8-build-log
          path: barcode_scanner_flutter/epoch8_build.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Verify CRPT symbols in epoch8 framework
        run: |
          set -euo pipefail
          BIN="ios/third_party/ZXingCpp.xcframework/ios-arm64/ZXing.framework/ZXing"
          test -f "$BIN"
          nm "$BIN" | grep -E "readbarcodescrpt_samplegridv1|readbarcodescrpt_detector_v1_samplegridv1"

      - name: Pod install
        run: |
          cd ios
          pod repo update
          pod install --verbose
          cd ..

      - name: Build iOS (no codesign)
        run: |
          set -o pipefail
          flutter build ios --release --no-codesign --verbose 2>&1 | tee build_ios.log

      - name: Show iOS build log tail on failure
        if: failure()
        run: |
          echo '--- Last 250 lines of build_ios.log ---'
          tail -n 250 build_ios.log || true

      - name: Upload iOS build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-build-log
          path: barcode_scanner_flutter/build_ios.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Repackage as unsigned .ipa
        run: |
          set -e
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH"
            ls -la build/ios/iphoneos || true
            exit 1
          fi
          rm -rf Payload
          mkdir Payload
          cp -R "$APP_PATH" Payload/Runner.app
          # Sanity: model bundled?
          if [ -f Payload/Runner.app/Frameworks/App.framework/flutter_assets/assets/models/best_full_integer_quant.tflite ]; then
            echo "Model size: $(stat -f%z Payload/Runner.app/Frameworks/App.framework/flutter_assets/assets/models/best_full_integer_quant.tflite) bytes"
          else
            echo "WARN: model not at expected path; listing flutter_assets:"
            find Payload/Runner.app -name 'best_full_integer_quant.tflite' -print || true
          fi
          zip -qry DMTXScanner-unsigned.ipa Payload
          ls -la DMTXScanner-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DMTXScanner-unsigned-ipa
          path: barcode_scanner_flutter/DMTXScanner-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
