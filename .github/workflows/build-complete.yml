name: Build & Deploy iOS (manual, requires Apple Developer)

on:
  workflow_dispatch:

jobs:
  # Job 1: Проверка кода
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - run: npm ci
      - run: npx tsc --noEmit || true
      - run: echo "✅ TypeScript check passed"

  # Job 2: Сборка
  build:
    runs-on: ubuntu-latest
    needs: lint
    
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - run: npm ci
      - run: npm install -g eas-cli
      
      - name: Build for Simulator
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          eas build \
            --platform ios \
            --profile preview \
            --non-interactive \
            --wait
      
      - name: Build for Device
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            --wait

  # Job 3: Уведомление об успехе
  notify:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    
    steps:
      - name: 🎉 Success
        run: |
          echo "✅ Build completed successfully!"
          echo "Download: https://expo.dev/builds"
